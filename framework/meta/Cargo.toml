[package]
name = "multiversx-sc-meta"
version = "0.66.1"
edition = "2024"

authors = [
    "Andrei Marinica <andrei.marinica@multiversx.com>",
    "MultiversX <contact@multiversx.com>",
]
license = "GPL-3.0-only"
readme = "README.md"
repository = "https://github.com/multiversx/mx-sdk-rs"
homepage = "https://multiversx.com/"
documentation = "https://docs.multiversx.com/"
description = "MultiversX smart contract crate management standalone tool"
keywords = ["multiversx", "blockchain", "contract", "debug"]
categories = ["cryptography::cryptocurrencies", "development-tools::debugging"]

[[bin]]
name = "sc-meta"
path = "src/main.rs"

[features]
template-test-current = []
template-test-released = []
chain-simulator-tests = []
repro-build-test = []
install-debugger-test = []

[dependencies]
clap = { version = "4.4", features = ["derive"] }
tokio = { version = "1.24", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = { version = "1.0", features = ["preserve_order"] }
colored = "3.0"
convert_case = "0.11"
semver = "1.0.20"
ruplacer = { version = "0.10", default-features = false }
regex = "1.11"
reqwest = { version = "0.13", features = ["rustls", "blocking", "json"] }
copy_dir = "0.1.2"
pathdiff = "0.2.1"
common-path = "1.0.0"
bip39 = { version = "2.0", features = ["rand"] }
rand = { version = "0.10", default-features = false }
uuid = { version = "1.10", features = ["v4"] }
anyhow = "1.0"
hex = "0.4.3"
base64 = "0.22"
indexmap = { version = "2", features = ["serde"] }
# warning: newer versions require Rust 1.88, hence we are not upgrading yet
zip = { version = "7.2", features = ["deflate"], default-features = false }
# rpassword >=7.4 requires Rust 1.88 (let_chains), pin to 7.3.x for Rust 1.85 compat
rpassword = "~7.3"

[dependencies.multiversx-sc-meta-lib]
version = "=0.66.1"
path = "../meta-lib"

[dependencies.multiversx-sc]
version = "=0.66.1"
path = "../base"
features = ["alloc", "num-bigint"]

[dependencies.multiversx-sc-snippets]
version = "=0.66.1"
path = "../snippets"

[dependencies.multiversx-sc-scenario]
version = "=0.66.1"
path = "../scenario"

[dependencies.multiversx-chain-core]
version = "=0.23.0"
path = "../../chain/core"
features = ["std"]

[dependencies.multiversx-sdk]
version = "=0.16.0"
path = "../../sdk/core"

[dev-dependencies]
serial_test = "3.2"
