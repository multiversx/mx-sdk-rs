[package]
name = "multiversx-sdk"
version = "0.16.1"
edition = "2024"

authors = [
    "MultiversX <contact@multiversx.com>",
]
license = "MIT"
readme = "README.md"
repository = "https://github.com/multiversx/mx-sdk-rs"
homepage = "https://multiversx.com/"
documentation = "https://docs.multiversx.com/"
description = "SDK for interacting with the MultiversX blockchain"
categories = ["cryptography::cryptocurrencies", "api-bindings"]
keywords = ["multiversx", "blockchain", "sdk", "api"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
serde_repr = "0.1"
anyhow = "1.0"
bip39 = "2.0"
sha2 = "0.11"
sha3 = "0.12"
hmac = "0.13"
hex = "0.4"
pbkdf2 = { version = "0.13", default-features = false }
zeroize = "1.4"
itertools = "0.14"
pem = "3.0"
log = "0.4"
scrypt = { version = "0.12", default-features = false }
aes = "0.9"
ctr = "0.10"

[dependencies.multiversx-chain-core]
version = "=0.23.1"
features = ["std"]
path = "../../chain/core"
