[package]
name = "very-large-storage-interactor"
version = "0.0.0"
authors = ["Andrei Marinica <andrei.marinica@multiversx.com>"]
edition = "2024"
publish = false

[[bin]]
name = "very-large-storage-interactor"
path = "src/vls_interactor_main.rs"

[lib]
path = "src/vls_interactor.rs"

[dependencies.very-large-storage]
path = ".."

[dependencies.multiversx-sc-snippets]
workspace = true

[dependencies]
clap = { version = "4.4", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
toml = "1.0"
tokio = { version = "1.24" }

[features]
chain-simulator-tests = []
